apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: grafana
  labels:
    dashboards: grafana
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
spec:
  config:
    log:
      mode: console
    server:
      root_url: "https://grafana-aceite.apps.example.invalid"
    auth:
      disable_login_form: "false"
      login_cookie_name: grafana_session
    security:
      cookie_secure: "true"
      cookie_samesite: lax
      content_security_policy: "true"
      strict_transport_security: "true"
      x_content_type_options: "true"
      x_xss_protection: "true"
    analytics:
      reporting_enabled: "false"
      check_for_updates: "false"
      check_for_plugin_updates: "false"
    users:
      viewers_can_edit: "false"
      editors_can_admin: "false"
    unified_alerting:
      enabled: "true"
    auth.generic_oauth:
      enabled: "true"
      name: "Keycloak"
      allow_sign_up: "true"
      auto_login: "false"
      client_id: "${AUTH_CLIENT_ID}"
      client_secret: "${AUTH_CLIENT_SECRET}"
      scopes: "openid email profile"
      auth_url: "https://keycloak-aceite.apps.example.invalid/realms/observability/protocol/openid-connect/auth"
      token_url: "https://keycloak-aceite.apps.example.invalid/realms/observability/protocol/openid-connect/token"
      api_url: "https://keycloak-aceite.apps.example.invalid/realms/observability/protocol/openid-connect/userinfo"
      email_attribute_path: email
      login_attribute_path: preferred_username
      name_attribute_path: name
      groups_attribute_path: groups
      use_pkce: "true"
      use_refresh_token: "true"
      tls_skip_verify_insecure: "true"
      signout_redirect_url: "https://keycloak-aceite.apps.example.invalid/realms/observability/protocol/openid-connect/logout?client_id=grafana&post_logout_redirect_uri=https%3A%2F%2Fgrafana-aceite.apps.example.invalid%2F"
      role_attribute_strict: "true"
      allow_assign_grafana_admin: "true"
      role_attribute_path: "contains(groups[*], '/observability/grafana-grafana-admins') && 'GrafanaAdmin' || contains(groups[*], '/observability/grafana-admins') && 'Admin' || contains(groups[*], '/observability/grafana-editors') && 'Editor' || contains(groups[*], '/observability/grafana-viewers') && 'Viewer' || 'None'"
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: AUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth
                      key: client-id
                - name: AUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth
                      key: client-secret
  route:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "11"
    spec:
      host: grafana-aceite.apps.example.invalid
      tls:
        insecureEdgeTerminationPolicy: Redirect
        termination: edge

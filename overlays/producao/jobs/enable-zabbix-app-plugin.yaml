apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-enable-zabbix-app-plugin
  namespace: grafana
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "50"
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: enable-plugin
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          env:
            - name: GRAFANA_URL
              value: http://grafana-service.grafana.svc:3000
            - name: GRAFANA_PLUGIN_ID
              value: alexanderzobnin-zabbix-app
            - name: GRAFANA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: GF_SECURITY_ADMIN_USER
            - name: GRAFANA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: GF_SECURITY_ADMIN_PASSWORD
          command:
            - sh
            - -ec
            - |
              for attempt in $(seq 1 60); do
                if curl -fsS "${GRAFANA_URL}/api/health" >/dev/null; then
                  break
                fi
                sleep 5
              done

              curl -fsS \
                -u "${GRAFANA_ADMIN_USER}:${GRAFANA_ADMIN_PASSWORD}" \
                -X POST \
                -H 'Content-Type: application/json' \
                -d '{"enabled":true,"pinned":true}' \
                "${GRAFANA_URL}/api/plugins/${GRAFANA_PLUGIN_ID}/settings" >/dev/null

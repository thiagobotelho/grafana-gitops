apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: prometheus-overview
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  folderRef: grafana-folder-observability
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 12h
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus-OCP
  grafanaCom:
    id: 19105
    revision: 9

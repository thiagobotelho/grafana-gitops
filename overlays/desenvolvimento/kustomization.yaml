apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - grafana-instance.yaml
  - rules/openshift-monitoring-access.yaml
  - rules/loki-access.yaml
  - dashboards/dashboard-openshift-overview.yaml
  - dashboards/dashboard-argocd.yaml
  - dashboards/dashboard-keycloak-capacity.yaml
  - dashboards/dashboard-keycloak-troubleshooting.yaml
  - datasources/zabbix-datasource.yaml
  - datasources/tempo-datasource.yaml
  - datasources/loki-datasource.yaml
  - datasources/prometheus-datasource.yaml

labels:
  - pairs:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: grafana-desenvolvimento
      app.kubernetes.io/component: dashboard
      app.kubernetes.io/part-of: observability
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/environment: desenvolvimento
    includeSelectors: false

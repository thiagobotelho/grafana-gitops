apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-ocp
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "21"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  valuesFrom:
    - targetPath: "secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: prometheus-ocp-token
          key: token

  instanceSelector:
    matchLabels:
      dashboards: grafana

  datasource:
    uid: prometheus-ocp
    name: Prometheus-OCP
    type: prometheus
    access: proxy
    url: https://thanos-querier.openshift-monitoring.svc:9091
    jsonData:
      # O endpoint usa a CA interna do OpenShift; o token fica em Secret.
      tlsSkipVerify: true
      httpHeaderName1: "Authorization"
      timeInterval: 30s
      # Torna exemplares OpenMetrics clicáveis e abre o trace no Tempo.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: "Abrir trace no Tempo"
    secureJsonData:
      httpHeaderValue1: "Bearer ${token}"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-apps
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "21"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    uid: prometheus-apps
    name: Prometheus-Apps
    type: prometheus
    access: proxy
    url: http://apps-monitoring-prometheus.observability-apps.svc:9090
    isDefault: false
    jsonData:
      timeInterval: 30s
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: "Abrir trace no Tempo"

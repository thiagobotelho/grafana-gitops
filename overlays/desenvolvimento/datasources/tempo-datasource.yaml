apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: tempo
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "23"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-tempo-token
          key: token
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    uid: tempo
    name: Tempo
    type: tempo
    access: proxy
    url: https://tempo-tempo-monolithic-gateway.tempo.svc.cluster.local:8080/api/traces/v1/dev
    isDefault: false
    jsonData:
      httpMethod: GET
      tlsSkipVerify: true
      httpHeaderName1: Authorization
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus-ocp
      # Correlaciona spans com os logs do mesmo serviço/trace no Loki.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        tags:
          - key: service.name
            value: service_name
        filterByTraceID: true
        filterBySpanID: false
      # Oferece consultas PromQL contextualizadas a partir do trace.
      tracesToMetrics:
        datasourceUid: prometheus-ocp
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        tags:
          - key: service.name
            value: service_name
        queries:
          - name: "Taxa de requisições"
            query: "sum(rate(traces_span_metrics_calls_total{$$__tags}[5m]))"
          - name: "Latência p95"
            query: "histogram_quantile(0.95, sum(rate(traces_span_metrics_duration_milliseconds_bucket{$$__tags}[5m])) by (le))"
      search:
        hide: false
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
    secureJsonData:
      httpHeaderValue1: "Bearer ${token}"

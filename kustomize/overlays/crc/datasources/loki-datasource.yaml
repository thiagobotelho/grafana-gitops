apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-loki-token
          key: token
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    uid: loki
    name: Loki
    type: loki
    access: proxy
    url: https://loki-gateway-http.openshift-logging.svc.cluster.local:8080
    jsonData:
      tlsSkipVerify: true
      timeout: 60
      httpHeaderName1: Authorization
      httpHeaderName2: X-Scope-OrgID
      # Procura trace_id nos logs e cria um link direto para o Tempo.
      derivedFields:
        - name: TraceID
          matcherRegex: '"?(?:trace_id|traceId)"?[=:]"?([a-fA-F0-9]{16,32})'
          datasourceUid: tempo
          url: "$${__value.raw}"
          urlDisplayLabel: "Abrir trace"
    secureJsonData:
      httpHeaderValue1: "Bearer ${token}"
      httpHeaderValue2: application

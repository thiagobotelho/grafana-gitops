# Dashboard pequeno e versionado para capacidade do OpenShift Local.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: openshift-local-overview
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m
  json: |
    {
      "uid": "openshift-local-overview",
      "title": "OpenShift Local - Overview",
      "tags": ["openshift", "crc"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "panels": [
        {
          "type": "stat",
          "title": "Pods running",
          "datasource": {"type": "prometheus", "uid": "prometheus-ocp"},
          "targets": [{"expr": "sum(kube_pod_status_phase{phase=\"Running\"})"}],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Cluster CPU usage",
          "datasource": {"type": "prometheus", "uid": "prometheus-ocp"},
          "targets": [{"expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))"}],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Cluster memory usage",
          "datasource": {"type": "prometheus", "uid": "prometheus-ocp"},
          "targets": [{"expr": "1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)"}],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}
        }
      ]
    }

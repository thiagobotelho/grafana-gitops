# Credenciais devem existir no Secret zabbix-datasource; veja o README.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: zabbix
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "24"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  valuesFrom:
    - targetPath: secureJsonData.password
      valueFrom:
        secretKeyRef: {name: zabbix-datasource, key: password}
    - targetPath: jsonData.username
      valueFrom:
        secretKeyRef: {name: zabbix-datasource, key: username}
  plugins:
    - name: alexanderzobnin-zabbix-app
      version: 6.4.0
  datasource:
    name: Zabbix
    type: alexanderzobnin-zabbix-datasource
    access: proxy
    url: http://zabbix-web.zabbix.svc:8080/api_jsonrpc.php
    jsonData:
      trends: true
      trendsFrom: 7d
      trendsRange: 4d

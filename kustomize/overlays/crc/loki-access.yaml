apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-loki
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "20"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-loki-token
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    kubernetes.io/service-account.name: grafana-loki
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-loki-application-view
  annotations:
    argocd.argoproj.io/sync-wave: "20"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-application-view
subjects:
  - kind: ServiceAccount
    name: grafana-loki
    namespace: grafana
